{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{
/* Setting the global font family to Inter with modern system fallbacks */
font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
background: url("{% static 'images/login1.png' %}") no-repeat center center fixed;
min-height:100vh;
display:flex;
align-items:center;
justify-content:right;
background-size: cover;
margin-right: 300px;
}

.card-ui{
width:520px;
backdrop-filter: blur(14px);
-webkit-backdrop-filter: blur(14px);
/* Slightly darkened for premium readability over the background image */
background: rgba(255, 255, 255, 0.75); 
padding:40px;
border-radius:30px;
box-shadow:0 20px 50px rgba(0,0,0,.15);
/* Enforcing crisp deep slate/navy color variables within the card scope */
--bs-heading-color: #0f172a;
--bs-body-color: #334155;
}
.form-control{
height:52px;
border-radius:12px;
}
</style>
</head>
<body>

<div class="container-fluid d-flex justify-content-end px-5">
    <div class="card-ui shadow-lg border-0 p-4">
        
        <div class="text-center mb-3">
            <h2 class="fw-bold mb-1 fs-3" style="color: #0f172a; letter-spacing: -0.5px;">Create Account</h2>
            <p class="small mb-0" style="color: #64748b; font-weight: 400;">Please fill in the details to register</p>
        </div>

        <form method="POST" class="needs-validation">
            {% csrf_token %}
            
            <div class="django-form-wrapper">

{% for field in form %}

<div class="mb-3">

<label class="form-label">

{{ field.label }}

</label>

{{ field }}

{% if field.errors %}

<div class="text-danger small">

{{ field.errors }}

</div>

{% endif %}

</div>

{% endfor %}

</div>

            <button class="btn btn-primary w-100 py-2 rounded-2 fw-semibold mt-2 shadow-sm" style="letter-spacing: -0.1px;">
                Register
            </button>
        </form>

        <div class="text-center mt-3">
            <p class="small mb-0" style="color: #64748b;">
                Already have an account? 
                <a href="{% url 'login' %}" class="text-decoration-none fw-semibold" style="color: #0284c7;">Sign In</a>
            </p>
        </div>

    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        // 1. Target and completely remove Django's default help text elements (.helptext)
        const helpTexts = document.querySelectorAll('.django-form-wrapper .helptext');
        helpTexts.forEach(text => text.remove());

        const formFields = document.querySelectorAll('.django-form-wrapper input, .django-form-wrapper select, .django-form-wrapper textarea');
        
        formFields.forEach(field => {
            // Updated text and border styling directly inside the loop for ultimate cleanliness
            field.classList.add('form-control', 'mb-2', 'rounded-2');
            field.style.color = '#1e293b'; // Slate 800 for filled text
            field.style.borderColor = '#cbd5e1'; // Slate 300 for crisp input borders
            field.style.fontSize = '0.95rem';
            
            if (!field.placeholder && field.id) {
                const label = document.querySelector(`label[for="${field.id}"]`);
                if (label) {
                    field.placeholder = label.textContent.replace(':', '');
                    // Adjusted labels to a professional medium weight and slate-700 gray color
                    label.classList.add('form-label', 'small', 'fw-medium', 'mb-1');
                    label.style.color = '#475569'; 
                }
            }
            
            const parentParagraph = field.closest('p');
            if (parentParagraph) {
                parentParagraph.classList.add('mb-2');
            }
        });
    });
</script>

</body>
</html>
